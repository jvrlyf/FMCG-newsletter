# docker-compose.yml
version: "3.8"

services:
  app:
    build: .
    container_name: fmcg-newsletter
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434   # Service name, not host.docker.internal
      - OLLAMA_MODEL=${OLLAMA_MODEL:-minimax-m3:cloud}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - fmcg-network

  ollama:
    image: ollama/ollama:latest
    container_name: fmcg-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]  # Remove if no GPU
    networks:
      - fmcg-network

networks:
  fmcg-network:
    driver: bridge

volumes:
  ollama-data: